<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQUAD CLASSIC 2026 - 観客投票</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after {
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'BIZ UDPGothic', Meiryo, sans-serif;
      box-sizing: border-box; margin: 0; padding: 0;
    }
    html { scroll-behavior: smooth; }
    body { background: #080c14; color: white; }
    .page-bg {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 15% 0%, rgba(38,93,183,0.09) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 100%, rgba(26,63,143,0.06) 0%, transparent 50%),
        #080c14;
    }
    .hero-section {
      background: linear-gradient(160deg, #060e1f 0%, #0a0f1e 50%, #080c14 100%);
      border-bottom: 1px solid rgba(38,93,183,0.18);
      position: relative; overflow: hidden;
    }
    .hero-section::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(38,93,183,0.14) 0%, transparent 65%);
      pointer-events: none;
    }
    .blue-line {
      height: 2px;
      background: linear-gradient(90deg, transparent, #265db7, #60a5fa, #265db7, transparent);
      max-width: 220px; margin: 18px auto;
    }
    .section-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px; padding: 28px; margin-bottom: 20px;
    }
    .section-title-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px; font-size: 15px; font-weight: 700;
      color: #265db7; letter-spacing: 0.03em;
    }
    .section-title-row::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(38,93,183,0.35), transparent);
    }
    .step-badge {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #265db7, #1a3f8f);
      color: white; font-size: 12px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; box-shadow: 0 2px 12px rgba(38,93,183,0.4);
    }
    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }
    .player-card {
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 20px 12px 16px;
      background: rgba(255,255,255,0.02);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      transition: all 0.2s ease; position: relative; text-align: center;
    }
    .player-card:hover {
      border-color: rgba(38,93,183,0.4);
      background: rgba(38,93,183,0.05);
      transform: translateY(-2px);
    }
    .player-card.selected {
      border-color: #265db7;
      background: rgba(38,93,183,0.12);
      box-shadow: 0 0 20px rgba(38,93,183,0.25);
    }
    .player-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #1e3a6e, #0f1f3d);
      border: 2px solid rgba(38,93,183,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: #60a5fa;
      transition: all 0.2s;
    }
    .player-card.selected .player-avatar {
      border-color: #265db7;
      box-shadow: 0 0 16px rgba(38,93,183,0.4);
    }
    .selected-badge {
      position: absolute; top: -8px; right: -8px;
      width: 24px; height: 24px; border-radius: 50%;
      background: linear-gradient(135deg, #265db7, #1a3f8f);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 10px rgba(38,93,183,0.5);
    }
    .progress-wrap {
      display: flex; align-items: center; justify-content: center;
      gap: 0; margin-bottom: 28px;
    }
    .prog-step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .prog-dot {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; transition: all 0.4s;
    }
    .prog-dot.active { background: linear-gradient(135deg, #265db7, #1a3f8f); box-shadow: 0 0 16px rgba(38,93,183,0.5); color: white; }
    .prog-dot.done   { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .prog-dot.inactive { background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.1); color: #475569; }
    .prog-label { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; }
    .prog-label.active { color: #60a5fa; }
    .prog-label.done   { color: #34d399; }
    .prog-label.inactive { color: #475569; }
    .prog-line {
      width: 64px; height: 2px; border-radius: 2px; margin-bottom: 18px; transition: all 0.4s;
    }
    .prog-line.done { background: linear-gradient(90deg, #10b981, #34d399); }
    .prog-line.inactive { background: rgba(255,255,255,0.08); }
    .vote-btn {
      width: 100%; padding: 18px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, #265db7, #1a3f8f, #102776);
      color: white; font-weight: 800; font-size: 16px; letter-spacing: 0.04em;
      cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden;
      box-shadow: 0 4px 20px rgba(38,93,183,0.35); font-family: inherit;
    }
    .vote-btn::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s;
    }
    .vote-btn:hover::before { left: 100%; }
    .vote-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(38,93,183,0.5); }
    .vote-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .back-btn {
      width: 100%; padding: 13px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
      background: none; color: #64748b; font-size: 13px; cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .back-btn:hover { border-color: rgba(255,255,255,0.2); color: #94a3b8; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes spinReverse { 100% { transform: rotate(-360deg); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
    @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }
    #loading-screen {
      position: fixed; inset: 0; z-index: 9999; background: #080c14;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    #loading-screen.hide { animation: fadeOut 0.6s ease forwards; }
    .loader-ring-outer { position: relative; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; }
    .ring { position: absolute; border-radius: 50%; border: 3px solid transparent; }
    .ring-1 { width:180px;height:180px; border-top-color:#265db7; border-right-color:#265db7; animation: spin 1.2s linear infinite; }
    .ring-2 { width:155px;height:155px; border-bottom-color:#60a5fa; border-left-color:#60a5fa; animation: spinReverse 1.8s linear infinite; }
    .ring-3 { width:130px;height:130px; border-top-color:rgba(38,93,183,0.4); border-right-color:rgba(38,93,183,0.4); animation: spin 2.4s linear infinite; }
    .loader-logo { width:100px;height:100px;border-radius:50%;object-fit:cover;animation:pulse 2s ease-in-out infinite;position:relative;z-index:1; }
    .loading-text { margin-top:28px;font-size:12px;font-weight:600;letter-spacing:0.25em;color:#265db7;text-transform:uppercase; }
    .loading-dots::after { content:'';animation:dots 1.5s steps(4,end) infinite; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
    ::-webkit-scrollbar-thumb { background: rgba(38,93,183,0.4); border-radius: 3px; }
  </style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP//Z" alt="SQUAD CLASSIC" />
    </div>
    <div class="loading-text loading-dots">Loading</div>
  </div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ============================================================
    // ★ GAS投票用 Web App URL をここに貼り付けてください
    // ============================================================
    const GAS_VOTE_URL = "https://script.google.com/macros/s/YOUR_VOTE_SCRIPT_ID/exec";

    const PHYSIQUE_PLAYERS = [
      { id: "p1", number: "No.1", name: "田中 雄大" },
      { id: "p2", number: "No.2", name: "鈴木 健太" },
      { id: "p3", number: "No.3", name: "佐藤 涼介" },
      { id: "p4", number: "No.4", name: "高橋 駿" },
      { id: "p5", number: "No.5", name: "伊藤 大輝" },
      { id: "p6", number: "No.6", name: "渡辺 蓮" },
    ];

    const LEGGINGS_PLAYERS = [
      { id: "l1", number: "No.1", name: "山田 さくら" },
      { id: "l2", number: "No.2", name: "中村 ひなた" },
      { id: "l3", number: "No.3", name: "小林 あおい" },
      { id: "l4", number: "No.4", name: "加藤 ゆい" },
      { id: "l5", number: "No.5", name: "吉田 まりな" },
      { id: "l6", number: "No.6", name: "山本 れな" },
    ];

    const A = "#265db7";
    const AL = "rgba(38,93,183,0.15)";
    const AB = "rgba(38,93,183,0.35)";

    function PlayerCard({ player, selected, onSelect }) {
      return (
        <div className={"player-card" + (selected ? " selected" : "")} onClick={() => onSelect(player.id)}>
          {selected && (
            <div className="selected-badge">
              <svg width="12" height="10" viewBox="0 0 12 9" fill="none">
                <path d="M1 4.5l3.5 3.5 6.5-7.5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </div>
          )}
          <div className="player-avatar">{player.name.charAt(0)}</div>
          <div>
            <div style={{ fontSize: 10, fontWeight: 600, color: "#64748b", letterSpacing: "0.08em", marginBottom: 3 }}>{player.number}</div>
            <div style={{ fontSize: 13, fontWeight: 700, color: "white", lineHeight: 1.3 }}>{player.name}</div>
          </div>
        </div>
      );
    }

    function ProgressBar({ step }) {
      const steps = [
        { key: "physique", label: "フィジーク" },
        { key: "leggings", label: "レギンス" },
      ];
      return (
        <div className="progress-wrap">
          {steps.map((s, i) => {
            const isDone   = (step === "leggings" && s.key === "physique") || step === "done";
            const isActive = step === s.key;
            const status   = isDone ? "done" : isActive ? "active" : "inactive";
            return (
              <React.Fragment key={s.key}>
                <div className="prog-step">
                  <div className={"prog-dot " + status}>
                    {status === "done"
                      ? <svg width="14" height="11" viewBox="0 0 12 9" fill="none"><path d="M1 4.5l3.5 3.5 6.5-7.5" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      : i + 1}
                  </div>
                  <div className={"prog-label " + status}>{s.label}</div>
                </div>
                {i < steps.length - 1 && (
                  <div className={"prog-line " + (isDone ? "done" : "inactive")} />
                )}
              </React.Fragment>
            );
          })}
        </div>
      );
    }

    function SelectedSummary({ label, player, color }) {
      if (!player) return null;
      return (
        <div style={{ marginBottom: 16, padding: "12px 16px", borderRadius: 12, background: "rgba(16,185,129,0.08)", border: "1px solid rgba(16,185,129,0.2)", color: "#34d399", fontSize: 13, display: "flex", alignItems: "center", gap: 8 }}>
          ✅ {label}投票完了：{player.number} {player.name}
        </div>
      );
    }

    function App() {
      const [step,         setStep]         = useState("physique");
      const [physiqueVote, setPhysiqueVote] = useState(null);
      const [leggingsVote, setLeggingsVote] = useState(null);
      const [sending,      setSending]      = useState(false);
      const [sendErr,      setSendErr]      = useState("");

      const selectedPhysique = PHYSIQUE_PLAYERS.find(p => p.id === physiqueVote);
      const selectedLeggings = LEGGINGS_PLAYERS.find(p => p.id === leggingsVote);

      const submitVote = async () => {
        setSending(true);
        setSendErr("");
        const payload = {
          timestamp:    new Date().toLocaleString("ja-JP"),
          physiqueVote: selectedPhysique ? selectedPhysique.number + " " + selectedPhysique.name : "",
          leggingsVote: selectedLeggings ? selectedLeggings.number + " " + selectedLeggings.name : "",
        };
        try {
          await fetch(GAS_VOTE_URL, {
            method: "POST", mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          setStep("done");
        } catch {
          setSendErr("送信に失敗しました。もう一度お試しください。");
        } finally {
          setSending(false);
        }
      };

      const sec = { background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 20, padding: 28, marginBottom: 20 };

      // 完了画面
      if (step === "done") return (
        <div className="page-bg" style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ textAlign: "center", padding: "48px 24px" }}>
            <div style={{ width: 96, height: 96, borderRadius: "50%", background: "linear-gradient(135deg, #265db7, #1a3f8f)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 24px", boxShadow: "0 0 40px rgba(38,93,183,0.45)" }}>
              <svg width="44" height="36" viewBox="0 0 44 36" fill="none">
                <path d="M2 18l14 14 26-30" stroke="white" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </div>
            <h2 style={{ fontSize: 28, fontWeight: 900, color: "white", marginBottom: 12 }}>投票完了！</h2>
            <p style={{ color: "#94a3b8", fontSize: 15 }}>ご投票ありがとうございました。</p>
            <p style={{ color: "#64748b", fontSize: 13, marginTop: 8 }}>結果は表彰式にてご発表します。</p>
            <div style={{ marginTop: 32, display: "flex", flexDirection: "column", gap: 12, maxWidth: 300, margin: "32px auto 0" }}>
              {[
                { label: "メンズフィジーク", player: selectedPhysique, color: A },
                { label: "レギンス",         player: selectedLeggings, color: "#7c3aed" },
              ].map(({ label, player, color }) => (
                <div key={label} style={{ padding: "14px 20px", borderRadius: 14, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", textAlign: "left" }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 4 }}>{label}</div>
                  <div style={{ color: "white", fontWeight: 700, fontSize: 15 }}>{player ? player.number + " " + player.name : "—"}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );

      return (
        <div className="page-bg">
          {/* Hero */}
          <div className="hero-section">
            <div style={{ maxWidth: 640, margin: "0 auto", padding: "40px 20px 36px", textAlign: "center", position: "relative", zIndex: 1 }}>
              <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.2em", color: A, textTransform: "uppercase", marginBottom: 12 }}>Audience Vote</div>
              <h1 style={{ fontSize: "clamp(26px,6vw,38px)", fontWeight: 900, color: "white", lineHeight: 1.1 }}>
                SQUAD <span style={{ background: "linear-gradient(135deg, #265db7, #60a5fa)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>CLASSIC</span> 2026
              </h1>
              <div className="blue-line" />
              <p style={{ color: "#94a3b8", fontSize: 13 }}>観客投票 ／ Audience Voting</p>
            </div>
          </div>

          <div style={{ maxWidth: 640, margin: "0 auto", padding: "28px 16px 60px" }}>
            <ProgressBar step={step} />

            {/* フィジーク */}
            {step === "physique" && (
              <div style={sec}>
                <div className="section-title-row">
                  <span className="step-badge">1</span>
                  メンズフィジーク
                  <span style={{ display: "inline-block", fontSize: 10, fontWeight: 700, padding: "2px 10px", borderRadius: 999, background: "rgba(38,93,183,0.15)", color: "#60a5fa", border: "1px solid rgba(38,93,183,0.3)" }}>PHYSIQUE</span>
                </div>
                <p style={{ fontSize: 13, color: "#64748b", marginBottom: 20 }}>最も優れていると思う選手を1名選んでください</p>
                <div className="player-grid">
                  {PHYSIQUE_PLAYERS.map(p => (
                    <PlayerCard key={p.id} player={p} selected={physiqueVote === p.id} onSelect={setPhysiqueVote} />
                  ))}
                </div>
                {physiqueVote && (
                  <div style={{ marginTop: 20, padding: "14px 20px", borderRadius: 14, background: "linear-gradient(135deg, rgba(38,93,183,0.1), rgba(26,63,143,0.06))", border: "1px solid " + AB, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ color: "#94a3b8", fontSize: 12 }}>選択中</div>
                    <div style={{ color: "white", fontWeight: 700 }}>{selectedPhysique?.number} {selectedPhysique?.name}</div>
                  </div>
                )}
                <div style={{ marginTop: 20 }}>
                  <button className="vote-btn" disabled={!physiqueVote} onClick={() => setStep("leggings")}>
                    レギンス投票へ進む →
                  </button>
                  {!physiqueVote && <p style={{ textAlign: "center", fontSize: 12, color: "#475569", marginTop: 10 }}>選手を選択してから次へ進めます</p>}
                </div>
              </div>
            )}

            {/* レギンス */}
            {step === "leggings" && (
              <div style={sec}>
                <SelectedSummary label="メンズフィジーク" player={selectedPhysique} />
                <div className="section-title-row">
                  <span className="step-badge" style={{ background: "linear-gradient(135deg, #7c3aed, #5b21b6)", boxShadow: "0 2px 12px rgba(124,58,237,0.4)" }}>2</span>
                  レギンス
                  <span style={{ display: "inline-block", fontSize: 10, fontWeight: 700, padding: "2px 10px", borderRadius: 999, background: "rgba(124,58,237,0.15)", color: "#a78bfa", border: "1px solid rgba(124,58,237,0.3)" }}>LEGGINGS</span>
                </div>
                <p style={{ fontSize: 13, color: "#64748b", marginBottom: 20 }}>最も優れていると思う選手を1名選んでください</p>
                <div className="player-grid">
                  {LEGGINGS_PLAYERS.map(p => (
                    <PlayerCard key={p.id} player={p} selected={leggingsVote === p.id} onSelect={setLeggingsVote} />
                  ))}
                </div>
                {leggingsVote && (
                  <div style={{ marginTop: 20, padding: "14px 20px", borderRadius: 14, background: "linear-gradient(135deg, rgba(124,58,237,0.1), rgba(91,33,182,0.06))", border: "1px solid rgba(124,58,237,0.3)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ color: "#94a3b8", fontSize: 12 }}>選択中</div>
                    <div style={{ color: "white", fontWeight: 700 }}>{selectedLeggings?.number} {selectedLeggings?.name}</div>
                  </div>
                )}
                <div style={{ marginTop: 20, display: "flex", flexDirection: "column", gap: 10 }}>
                  {sendErr && (
                    <div style={{ padding: "12px 16px", borderRadius: 12, background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.3)", color: "#f87171", fontSize: 13 }}>⚠️ {sendErr}</div>
                  )}
                  <button className="vote-btn" disabled={!leggingsVote || sending} onClick={submitVote}>
                    {sending ? "送信中..." : "投票を確定する →"}
                  </button>
                  <button className="back-btn" onClick={() => setStep("physique")}>
                    ← フィジーク投票に戻る
                  </button>
                  {!leggingsVote && <p style={{ textAlign: "center", fontSize: 12, color: "#475569" }}>選手を選択してから確定できます</p>}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var el = document.getElementById('loading-screen');
        if (el) { el.classList.add('hide'); setTimeout(function() { el.style.display = 'none'; }, 650); }
      }, 1200);
    });
  </script>
</body>
</html>
