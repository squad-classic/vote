<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQUAD CLASSIC — 最終投票</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:      #2E7BF6;
    --gold-light:#6AAEFF;
    --gold-dim:  #1A4FA0;
    --black:     #06080F;
    --surface2:  #0E1320;
    --border:    rgba(46,123,246,0.25);
    --border-hi: rgba(46,123,246,0.6);
    --text:      #EEF2FF;
    --muted:     #7A88A8;
    --danger:    #E05252;
    --radius:    6px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    line-height: 1.7;
  }

  .site-header {
    text-align: center;
    padding: 60px 20px 40px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .site-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(46,123,246,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .site-logo {
    width: 220px;
    height: auto;
    margin: 0 auto 8px;
    display: block;
    filter: drop-shadow(0 0 24px rgba(46,123,246,0.5));
  }

  .event-sub {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .gold-line {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 24px auto;
  }

  .container {
    max-width: 740px;
    margin: 0 auto;
    padding: 48px 20px 80px;
  }

  .type-badge {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid var(--border-hi);
    border-radius: 2px;
    padding: 4px 14px;
    margin-bottom: 32px;
  }

  .error-page {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
    line-height: 2.4;
  }

  .error-page a { color: var(--gold); text-decoration: none; }

  .notice {
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    border-radius: 0 var(--radius) var(--radius) 0;
    background: var(--surface2);
    padding: 20px 20px 20px 22px;
    margin-bottom: 32px;
  }

  .notice-title {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .notice ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }

  .notice li {
    font-size: 13px;
    color: #C8C5BC;
    padding-left: 16px;
    position: relative;
    line-height: 1.6;
  }

  .notice li::before { content: '—'; position: absolute; left: 0; color: var(--gold-dim); }
  .notice li.important { color: #6AAEFF; }

  .about-section {
    margin-bottom: 40px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .about-header {
    background: linear-gradient(135deg, #0E1320 60%, #0f1e3a);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .about-header-logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.12em;
    color: #fff;
  }

  .about-header-logo span { color: var(--gold); }

  .about-body {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .about-concept {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.05em;
    line-height: 1.6;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .about-mission {
    font-size: 13px;
    color: #C8C5BC;
    line-height: 1.8;
  }

  .about-values {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .value-item {
    background: var(--black);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
  }

  .value-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .value-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .purpose-section {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 32px;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }

  .purpose-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .purpose-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .purpose-text {
    font-size: 13px;
    color: #C8C5BC;
    line-height: 1.9;
  }

  .form-section { display: flex; flex-direction: column; gap: 24px; }

  .field { display: flex; flex-direction: column; gap: 8px; }

  .field label {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .field label .req { color: var(--gold); margin-left: 4px; }

  .field input[type="email"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
  }

  .field input[type="email"]:focus { border-color: var(--border-hi); }
  .field input::placeholder { color: #555; }
  .field .hint { font-size: 12px; color: var(--muted); }

  .athlete-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .athlete-card { cursor: pointer; user-select: none; }

  .athlete-card input[type="radio"] { display: none; }

  .athlete-card-inner {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.2s, background 0.2s;
  }

  .athlete-card input[type="radio"]:checked + .athlete-card-inner {
    border-color: var(--gold);
    background: rgba(46,123,246,0.06);
  }

  .athlete-radio-dot {
    width: 18px;
    height: 18px;
    min-width: 18px;
    border: 1px solid var(--border-hi);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .athlete-card input[type="radio"]:checked + .athlete-card-inner .athlete-radio-dot {
    border-color: var(--gold);
  }

  .athlete-radio-dot::after {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .athlete-card input[type="radio"]:checked + .athlete-card-inner .athlete-radio-dot::after {
    opacity: 1;
  }

  .athlete-info { display: flex; flex-direction: column; gap: 2px; }

  .athlete-number {
    font-size: 10px;
    color: var(--gold-dim);
    letter-spacing: 0.1em;
  }

  .athlete-name {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
  }

  .agree-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .agree-row input[type="checkbox"] { display: none; }

  .custom-check {
    width: 20px;
    height: 20px;
    min-width: 20px;
    border: 1px solid var(--border-hi);
    border-radius: 3px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
    transition: background 0.15s, border-color 0.15s;
  }

  .agree-row input[type="checkbox"]:checked + .custom-check {
    background: var(--gold);
    border-color: var(--gold);
  }

  .custom-check::after {
    content: '';
    width: 10px;
    height: 6px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .agree-row input[type="checkbox"]:checked + .custom-check::after { opacity: 1; }
  .agree-text { font-size: 13px; color: #A8A49C; line-height: 1.6; }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1px solid var(--gold);
    border-radius: var(--radius);
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .submit-btn:hover:not(:disabled) { background: var(--gold); color: #fff; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-msg {
    display: none;
    text-align: center;
    padding: 14px;
    border-radius: var(--radius);
    font-size: 14px;
    margin-top: 16px;
  }

  .status-msg.success {
    display: block;
    background: rgba(46,123,246,0.1);
    border: 1px solid var(--border-hi);
    color: var(--gold-light);
  }

  .status-msg.error {
    display: block;
    background: rgba(224,82,82,0.1);
    border: 1px solid rgba(224,82,82,0.4);
    color: var(--danger);
  }

  .site-footer {
    text-align: center;
    padding: 24px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .thanks-screen {
    text-align: center;
    padding: 60px 20px;
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .thanks-icon {
    width: 64px;
    height: 64px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
  }

  .thanks-icon::after {
    content: '';
    width: 22px;
    height: 13px;
    border-left: 2px solid var(--gold);
    border-bottom: 2px solid var(--gold);
    transform: rotate(-45deg) translateY(-3px);
  }

  .thanks-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #fff;
    margin-bottom: 16px;
  }

  .thanks-body { font-size: 14px; color: var(--muted); line-height: 2; }

  .thanks-divider {
    width: 40px;
    height: 1px;
    background: var(--border-hi);
    margin: 28px auto;
  }

  @media (max-width: 480px) {
    .athlete-grid { grid-template-columns: 1fr 1fr; }
    .about-values { grid-template-columns: 1fr; }
  }

  /* ========== PRIVACY ========== */
  .privacy-block {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface2);
    padding: 16px 20px;
    margin-bottom: 32px;
  }

  .privacy-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--gold-light);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }

  .privacy-text {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.8;
  }

  /* ========== CRITERIA ========== */
  .criteria-section {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 32px;
  }

  .criteria-title {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
  }

  .criteria-pose-block {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .criteria-pose-block:last-child { border-bottom: none; }

  .criteria-pose-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--gold-light);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .criteria-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0;
  }

  .criteria-section > .criteria-list {
    padding: 16px 20px;
  }

  .criteria-list li {
    font-size: 13px;
    color: #C8C5BC;
    padding-left: 16px;
    position: relative;
    line-height: 1.6;
  }

  .criteria-list li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--gold-dim);
  }

  .criteria-part {
    color: var(--gold-light);
    font-weight: 700;
    margin-right: 6px;
  }

</style>
</head>

        <li>全体のプロポーションや姿勢が良い</li>
        <li>魅力的な雰囲気（表情など）</li>
        <li>ヘアスタイル・メイク・コスチュームのセンスが高い</li>
        <li>優雅なウォーキング（足の運びや歩くペース、ウォーキング中の仕草）</li>
        <li>各部位が引き締まっている</li>
      </ul>
    </div>
  `;

  const maleCriteria = `
    <div class="criteria-section">
      <p class="criteria-title">審査基準</p>
      <div class="criteria-pose-block">
        <p class="criteria-pose-label">フロントポーズ</p>
        <ul class="criteria-list">
          <li><span class="criteria-part">肩</span>肩の輪郭がはっきり出ている、形も丸く突出している</li>
          <li><span class="criteria-part">胸</span>大胸筋上部が凹んでいない。全体的に分厚い</li>
          <li><span class="criteria-part">腹</span>腹筋の割れがきれいに割れている</li>
          <li><span class="criteria-part">Vシェイプ</span>ウエストの細さ、大胸筋と三角筋の発達のバランスで強く出ている。左右の広背筋の広がりが強く出ている</li>
        </ul>
      </div>
      <div class="criteria-pose-block">
        <p class="criteria-pose-label">バックポーズ</p>
        <ul class="criteria-list">
          <li><span class="criteria-part">背中の凹凸</span>背中の凹凸があり全体的に分厚い</li>
          <li><span class="criteria-part">背中の広がり</span>背中の広がりが大きい、ウエストの少し上から広背筋の広がりが始まっている、大円筋が大きくボリュームがある</li>
          <li><span class="criteria-part">肩</span>筋肉のサイズが大きく輪郭がはっきりしている、筋肉量も多く形がきれい</li>
          <li><span class="criteria-part">脊柱起立筋</span>脊柱起立筋（真ん中）が分厚い、背骨のところの溝が深くなっている</li>
          <li><span class="criteria-part">腕</span>腕が太く外側へ大きく張り出している、逆三角形ができる。腕が太く、カットが出ている</li>
        </ul>
      </div>
    </div>
  `;

  function athleteCards(athletes) {
    return athletes.map(a => `
      <label class="athlete-card">
        <input type="radio" name="vote" value="${a.name}" required>
        <div class="athlete-card-inner">
          <div class="athlete-radio-dot"></div>
          <div class="athlete-info">
            <span class="athlete-number">${a.number}</span>
            <span class="athlete-name">${a.name}</span>
          </div>
        </div>
      </label>
    `).join('');
  }

  function renderForm(athletes, label, divisionKey, criteria) {
    document.title = `SQUAD CLASSIC — ${label} 最終投票`;
    main.innerHTML = `
      <span class="type-badge">${label}</span>
      ${privacyBlock}
      ${criteria}
      <div class="notice">
        <p class="notice-title">投票について</p>
        <ul>
          <li class="important">お一人様1回のみ有効です。複数回の投票は無効となります。</li>
          <li>1名を選択して送信してください。</li>
          <li>投票は送信後の変更・取り消しができません。</li>
        </ul>
      </div>
      <form class="form-section" id="the-form" onsubmit="submitVote(event,'${divisionKey}')">
        <div class="field">
          <label>メールアドレス<span class="req">*</span></label>
          <input type="email" name="email" required placeholder="example@mail.com">
          <span class="hint">※ 重複投票防止のために使用します。公開されません。</span>
        </div>
        <div class="athlete-grid">
          ${athleteCards(athletes)}
        </div>
        <label class="agree-row">
          <input type="checkbox" name="agree" required>
          <span class="custom-check"></span>
          <span class="agree-text">上記の注意事項および個人情報の取り扱いに同意のうえ投票します。</span>
        </label>
        <button type="submit" class="submit-btn" id="submit-btn">投票を送信する</button>
        <div class="status-msg" id="status-msg"></div>
      </form>
    `;
  }

  function render() {
    if      (type === 'male')   renderForm(MALE_ATHLETES,   '男性部門', 'male',   maleCriteria);
    else if (type === 'female') renderForm(FEMALE_ATHLETES, '女性部門', 'female', femaleCriteria);
    else renderError();
  }

  function renderError() {
    main.innerHTML = `
      <div class="error-page">
        <p>投票フォームのURLが正しくありません。</p>
        <p>男性部門の方は <a href="?type=male">こちら</a></p>
        <p>女性部門の方は <a href="?type=female">こちら</a></p>
      </div>
    `;
  }

  async function submitVote(e, division) {
    e.preventDefault();
    const form     = e.target;
    const btn      = document.getElementById('submit-btn');
    const statusEl = document.getElementById('status-msg');
    const data     = Object.fromEntries(new FormData(form).entries());
    data.division  = division;

    btn.disabled = true;
    btn.textContent = '送信中...';
    statusEl.className = 'status-msg';
    statusEl.style.display = 'none';

    try {
      await fetch(VOTE_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
        mode: 'no-cors'
      });
      showThanks();
    } catch (err) {
      showStatus(statusEl, false, 'エラーが発生しました。時間をおいて再度お試しください。');
      btn.disabled = false;
      btn.textContent = '投票を送信する';
    }
  }

  function showStatus(el, success, msg) {
    el.textContent = msg;
    el.className = 'status-msg ' + (success ? 'success' : 'error');
  }

  function showThanks() {
    main.innerHTML = `
      <div class="thanks-screen">
        <div class="thanks-icon"></div>
        <p class="thanks-title">ご投票ありがとうございました。</p>
        <div class="thanks-divider"></div>
        <p class="thanks-body">
          投票を受け付けました。<br>
          結果は当日のイベント内でご確認いただけます。<br>
          引き続き SQUAD CLASSIC をお楽しみください。
        </p>
      </div>
    `;
  }

  render();
</script>

</body>
</html>
